name: Build allCode Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: allcode-macos-arm64
            binary_name: allcode-macos-arm64
            os: macos-14
            archive: tar
          - artifact: allcode-macos-x86_64
            binary_name: allcode-macos-x86_64
            os: macos-15-intel
            archive: tar
          - artifact: allcode-windows-x86_64.exe
            binary_name: allcode-windows-x86_64
            os: windows-latest
            archive: zip
          - artifact: allcode-linux-x86_64
            binary_name: allcode-linux-x86_64
            os: ubuntu-22.04
            archive: tar
          - artifact: allcode-linux-arm64
            binary_name: allcode-linux-arm64
            os: ubuntu-22.04-arm
            archive: tar

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install ".[source-intelligence,package]"

      - name: Build onefile binary
        run: python packaging/build_onefile.py --name "${{ matrix.binary_name }}"

      - name: Verify Unix binary
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp "dist/${{ matrix.binary_name }}" "release/${{ matrix.artifact }}"
          chmod +x "release/${{ matrix.artifact }}"
          "release/${{ matrix.artifact }}" --version
          "release/${{ matrix.artifact }}" --check
          tar -C release -czf "release/${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"

      - name: Verify Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "dist\${{ matrix.binary_name }}.exe" "release\${{ matrix.artifact }}"
          & "release\${{ matrix.artifact }}" --version
          & "release\${{ matrix.artifact }}" --check
          Compress-Archive -Path "release\${{ matrix.artifact }}" -DestinationPath "release\${{ matrix.artifact }}.zip" -Force

      - name: Upload binary archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.tar.gz
            release/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download binary archives
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-artifacts
          find . -type f -print0 | sort -z | xargs -0 sha256sum > checksums.txt

      - name: Create release if needed
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes

      - name: Upload release assets
        run: |
          cd release-artifacts
          files=()
          while IFS= read -r -d '' file; do
            files+=("$file")
          done < <(find . -type f -print0)
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
